<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Biometric Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <main class="max-w-5xl mx-auto p-8">
      <h1 class="text-3xl font-bold mb-2">Modern Biometric Attendance Platform</h1>
      <p class="text-slate-300 mb-8">Choose your role to continue.</p>

      <div class="grid md:grid-cols-3 gap-4">
        <a href="/admin" class="rounded-xl border border-slate-700 p-6 bg-slate-900 hover:bg-slate-800">
          <h2 class="text-xl font-semibold">Admin Dashboard</h2>
          <p class="text-slate-400 mt-2">Manage users, courses, and enrollments.</p>
        </a>
        <a href="/lecturer" class="rounded-xl border border-slate-700 p-6 bg-slate-900 hover:bg-slate-800">
          <h2 class="text-xl font-semibold">Lecturer Dashboard</h2>
          <p class="text-slate-400 mt-2">View course attendance and reports.</p>
        </a>
        <a href="/student/register" class="rounded-xl border border-slate-700 p-6 bg-slate-900 hover:bg-slate-800">
          <h2 class="text-xl font-semibold">Student Registration</h2>
          <p class="text-slate-400 mt-2">Capture your face using webcam.</p>
        </a>
      </div>

      <a href="/student/scan" class="inline-block mt-6 text-cyan-300 hover:text-cyan-200">Go to student scan page →</a>
    </main>
  </body>
</html>
