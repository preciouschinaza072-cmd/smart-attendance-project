<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Face Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="max-w-4xl mx-auto p-6">
    <a href="/" class="text-cyan-300">← Home</a>
    <h1 class="text-2xl font-bold my-4">Student Face Registration</h1>

    <div class="grid md:grid-cols-2 gap-4">
      <section class="bg-slate-900 border border-slate-700 rounded-lg p-4">
        <label class="text-sm text-slate-300">Student</label>
        <select id="studentId" class="w-full mt-1 mb-3 p-2 rounded bg-slate-800 border border-slate-700"></select>
        <button id="startCamera" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded">Start Camera</button>
        <button id="captureFace" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded">Capture Face</button>
        <p id="registerStatus" class="mt-3 text-sm"></p>
      </section>
      <section class="bg-slate-900 border border-slate-700 rounded-lg p-4 relative">
        <video id="camera" autoplay playsinline class="w-full rounded-lg"></video>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="w-44 h-44 border-4 border-cyan-300 rounded-full opacity-80"></div>
        </div>
      </section>
    </div>

    <a href="/student/scan" class="inline-block mt-6 text-cyan-300">Go to scan page →</a>
  </div>
  <script src="/static/student_register.js"></script>
</body>
</html>
